# home-os: Drop-in für voxtype.service (User).
# 1) Vulkan-GPU erzwingen – der /usr/bin/voxtype-Wrapper nimmt bei VOXTYPE_GPU=1
#    das Vulkan-Binary (NVIDIA via nvidia_icd). Vermeidet den read-only-Konflikt
#    von `voxtype setup gpu` auf dem OSTree-System.
# 2) ydotool-Socket auf den User-Socket zeigen (siehe ydotool.service-User-Unit),
#    damit der paste-Modus Strg+V via ydotool senden kann. %t = $XDG_RUNTIME_DIR.
[Service]
Environment=VOXTYPE_GPU=1
Environment=YDOTOOL_SOCKET=%t/.ydotool_socket
