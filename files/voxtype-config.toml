# Voxtype – Systemvorgaben (verwaltet vom home-os Image)
# Volle Referenz aller Optionen: /usr/share/doc/voxtype/README.md
# Persönliche Overrides ggf. in ~/.config/voxtype/config.toml

[whisper]
# Multilingual-Modell (u. a. Deutsch). Wird beim Image-Build nach
# /usr/share/voxtype/models/ abgelegt -> absoluter Pfad, kein per-User-Download.
# Besseres Modell: ggml-medium.bin oder ggml-large-v3-turbo.bin
# (dann Dateinamen im recipe.yml-Download UND hier anpassen).
model = "/usr/share/voxtype/models/ggml-small.bin"

[output]
# KDE Plasma (Wayland) unterstützt das wtype-Protokoll nicht. "paste" legt den
# Text in die Zwischenablage (volles Unicode/Umlaute) und löst layout-unabhängig
# Strg+V via ydotool aus -> korrekt für CH/QWERTZ.
mode = "paste"
fallback_to_clipboard = true
