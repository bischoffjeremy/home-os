name: Build OS Image

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'devcontainer/**'
      # uConsole-only files -> handled by build-uconsole.yml, no notebook rebuild.
      # (recipes/common.yml is shared, so it is NOT ignored here.)
      - 'recipe-uconsole.yml'
      - 'Containerfile-uconsole'
      - '.github/workflows/build-uconsole.yml'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'devcontainer/**'
      - 'recipe-uconsole.yml'
      - 'Containerfile-uconsole'
      - '.github/workflows/build-uconsole.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build-and-scan:
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/template-build-scan.yml
    with:
      image_name: 'os-base'
      context: '.'
      dockerfile: './Containerfile'
      is_os_image: true          
      recipe_path: 'recipe.yml'
    secrets: inherit