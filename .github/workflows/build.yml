name: Build OS Image

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'devcontainer/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - 'devcontainer/**'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-scan:
    uses: ./.github/workflows/template-build-scan.yml
    with:
      image_name: 'os-base'
      context: '.'
      dockerfile: './Containerfile'
      is_os_image: true          
      recipe_path: 'recipe.yml'
    secrets: inherit