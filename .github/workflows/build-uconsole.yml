name: Build uConsole (private)

# Builds the PRIVATE uConsole image from recipe-uconsole.yml (BlueBuild) and
# pushes it to GHCR (os-uconsole:latest). It layers the shared home-os modules
# (recipes/common.yml) on top of the public uconsole-fedora "atomic" base.
#
# On the device: flash the public uconsole-fedora *atomic* image once, then
#   rpm-ostree rebase ostree-unverified-registry:ghcr.io/<owner>/os-uconsole:latest
# (see UCONSOLE.md). No flashable .img / bootc-image-builder / R2 here.

on:
  push:
    branches: [main, master]
    paths:
      - 'recipe-uconsole.yml'
      - 'recipes/common.yml'
      - 'files/**'
      - '.github/workflows/build-uconsole.yml'
  workflow_dispatch:

jobs:
  build-and-scan:
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/template-build-scan.yml
    with:
      image_name: 'os-uconsole'
      context: '.'
      # Generated by `bluebuild generate` at build time (gitignored).
      dockerfile: './Containerfile-uconsole'
      is_os_image: true
      recipe_path: 'recipe-uconsole.yml'
      # ARM64 runner: the base image (uconsole-fedora:atomic) is aarch64-only.
      runner: 'ubuntu-24.04-arm'
    secrets: inherit
