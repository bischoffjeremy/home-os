name: Template - Build & Scan

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Name of the image (e.g., dev-general, os-base)"
      context:
        required: true
        type: string
        description: "Docker build context path"
      dockerfile:
        required: true
        type: string
        description: "Path to the Containerfile"
      is_os_image:
        required: false
        type: boolean
        default: false
        description: "Set to true to use the fast OSTree filter scan and OS build steps"
      recipe_path:
        required: false
        type: string
        default: "recipe.yml"
        description: "Path to the recipe.yml (only used if is_os_image is true)"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── OS-Spezifische Schritte (Laufen nur bei is_os_image: true) ──
      - name: Free disk space (OS Only)
        if: ${{ inputs.is_os_image }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af

      - name: Install BlueBuild CLI on host (OS Only)
        if: ${{ inputs.is_os_image }}
        run: |
          sudo docker create --name bb-installer ghcr.io/blue-build/cli:v0.9-installer
          sudo docker cp bb-installer:/out/bluebuild /usr/local/bin/bluebuild
          sudo docker rm bb-installer
          bluebuild --version

      - name: Generate Containerfile from recipe (OS Only)
        if: ${{ inputs.is_os_image }}
        run: |
          bluebuild generate ${{ inputs.recipe_path }} -o ${{ inputs.dockerfile }}

      # ── Gemeinsame Build-Schritte ──
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # ── ROUTE A: Standard-Build (Dev-Container) ──
      - name: Build and push container image (Dev Container)
        id: build
        if: ${{ !inputs.is_os_image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}

      # ── ROUTE B: Buildx Build (OS-Image) ──
      - name: Build and push OS image (OS Only)
        id: build_os
        if: ${{ inputs.is_os_image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: false
          tags: ${{ env.IMAGE }}:latest
          outputs: type=registry

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless) - Dev Container
        if: ${{ github.event_name != 'pull_request' && !inputs.is_os_image }}
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

      - name: Sign image with Cosign (keyless) - OS Image
        if: ${{ github.event_name != 'pull_request' && inputs.is_os_image }}
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.build_os.outputs.digest }}"

  scan:
    needs: build
    if: github.event_name != 'pull_request' && !inputs.is_os_image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository (needed for recipe parsing)
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype db update

      # ── ROUTE A: Standard-Scan (Dev-Container) ──
      - name: Scan Full Image (Dev Container)
        if: ${{ !inputs.is_os_image }}
        run: |
          docker pull "${{ env.IMAGE }}:latest"
          syft docker:"${{ env.IMAGE }}:latest" --select-catalogers os -o json > /tmp/sbom.json
          grype sbom:/tmp/sbom.json -o json > /tmp/scan_results.json 2>/dev/null || true

      - name: Generate Markdown Report
        run: |
          IMAGE_NAME=$(basename "${{ env.IMAGE }}")
          REPORT_FILE="reports/${IMAGE_NAME}-security.md"

          TOTAL=$(jq '.matches | length' /tmp/scan_results.json 2>/dev/null || echo 0)
          CRIT=$(jq '[.matches[] | select(.vulnerability.severity=="Critical")] | length' /tmp/scan_results.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity=="High")] | length' /tmp/scan_results.json 2>/dev/null || echo 0)
          MED=$(jq '[.matches[] | select(.vulnerability.severity=="Medium")] | length' /tmp/scan_results.json 2>/dev/null || echo 0)
          LOW=$(jq '[.matches[] | select(.vulnerability.severity=="Low")] | length' /tmp/scan_results.json 2>/dev/null || echo 0)
          NEG=$(jq '[.matches[] | select(.vulnerability.severity=="Negligible")] | length' /tmp/scan_results.json 2>/dev/null || echo 0)

          if [ "$CRIT" -eq 0 ]; then STATUS="PASS ✅"; SCAN_EXIT=0; else STATUS="FAIL ❌"; SCAN_EXIT=1; fi

          VULN_TABLE=$(jq -r '
            [.matches[] | {
              s: .vulnerability.severity,
              p: .artifact.name,
              v: .artifact.version,
              f: (if .vulnerability.fix.versions and (.vulnerability.fix.versions|length)>0 then .vulnerability.fix.versions[0] else "—" end),
              id: .vulnerability.id,
              u: (.vulnerability.dataSource // "")
            }] | sort_by(if .s=="Critical" then 0 elif .s=="High" then 1 elif .s=="Medium" then 2 elif .s=="Low" then 3 else 4 end)
            | unique_by(.id + .p)[] | "| \(.s) | \(.p) | \(.v) | \(.f) | [\(.id)](\(.u)) |"' /tmp/scan_results.json 2>/dev/null)

          [ -z "$VULN_TABLE" ] && VULN_TABLE="| — | — | — | — | — |"

          mkdir -p reports
          cat > "$REPORT_FILE" <<REPORT
          # Security Report: ${IMAGE_NAME}

          **Last scan:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Image:** \`${{ env.IMAGE }}:latest\`

          ## Status
          | | |
          |:--|:--|
          | **Result** | $STATUS |
          | **Policy** | Fail on **Critical** severity |

          | Severity | Count |
          |:---------|------:|
          | 🔴 Critical | $CRIT |
          | 🟠 High | $HIGH |
          | 🟡 Medium | $MED |
          | 🔵 Low | $LOW |
          | ⚪ Negligible | $NEG |
          | **Total** | **$TOTAL** |

          ## Vulnerabilities
          | Severity | Package | Installed | Fixed In | CVE |
          |:---------|:--------|:----------|:---------|:----|
          $VULN_TABLE
          REPORT

          sed -i 's/^          //' "$REPORT_FILE"
          cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
          exit $SCAN_EXIT