name: Build Dev Container (dev-general)

on:
  push:
    branches: [main, master]
    paths:
      - 'devcontainer/dev-general/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'devcontainer/dev-general/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev container image
        uses: docker/build-push-action@v5
        with:
          context: ./devcontainer/dev-general
          file: ./devcontainer/dev-general/Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/dev-general:latest
          cache-from: type=gha,scope=dev-general
          cache-to: type=gha,mode=max,scope=dev-general
