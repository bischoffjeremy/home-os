
modules:
  - type: rpm-ostree
    install:
      - passwd
      - wireguard-tools
      - podman-compose
      # Voxtype runtime deps: wl-clipboard (paste-mode), libnotify (notifications),
      # pipewire-alsa (audio), playerctl (pause media). wtype = Wayland default;
      # not supported on KDE Plasma -> ydotool delivers the layout-independent
      # Ctrl+V keystroke for paste-mode.
      - wtype
      - ydotool
      - wl-clipboard
      - libnotify
      - pipewire-alsa
      - playerctl

  # --- Shared desktop configs (identical on both devices) ---
  #     CH keyboard (X11 + vconsole), de_CH locale, Europe/Zurich timezone, wallpaper.
  - type: files
    files:
      - source: default.jxl
        destination: /usr/share/backgrounds/default.jxl
      - source: default-dark.jxl
        destination: /usr/share/backgrounds/default-dark.jxl
      - source: vconsole.conf
        destination: /etc/vconsole.conf
      - source: 00-keyboard.conf
        destination: /etc/X11/xorg.conf.d/00-keyboard.conf
      - source: locale.conf
        destination: /etc/locale.conf
      - source: timezone
        destination: /etc/timezone
      # Per-user oneshot that applies the default wallpaper once (see script below).
      # A user service is used on purpose: editing the Plasma shell-layout file
      # (plasma-org.kde.plasma.desktop-appletsrc) system-wide risks wiping the
      # default panel; plasma-apply-wallpaperimage only touches the wallpaper.
      - source: set-default-wallpaper.service
        destination: /usr/lib/systemd/user/set-default-wallpaper.service

  # --- Shared system tweaks ---
  - type: script
    snippets:
      # increase inotify watches
      - mkdir -p /usr/lib/sysctl.d
      - echo "fs.inotify.max_user_watches=524288" > /usr/lib/sysctl.d/90-inotify.conf
      # enable root login (root:root)
      - echo "root:root" | chpasswd
      - passwd -u root
      # wireguard dir + timezone
      - mkdir -p /etc/wireguard
      - ln -sf /usr/share/zoneinfo/Europe/Zurich /etc/localtime
      # Default wallpaper, set centrally for both devices:
      #   - desktop: enable the per-user oneshot (installed via files above)
      #   - lockscreen: system default via kwriteconfig6 (kscreenlockerrc is a
      #     plain config, not the shell layout -> safe to merge a key into it)
      - systemctl --global enable set-default-wallpaper.service
      - kwriteconfig6 --file /etc/xdg/kscreenlockerrc --group Greeter --group Wallpaper --group org.kde.image --group General --key Image "file:///usr/share/backgrounds/default.jxl"
      - echo "Shared customizations applied."

  # --- Shared Flatpaks (system scope, both devices) ---
  #     Installed at first boot by the flatpak manager service, which runs a
  #     SINGLE `flatpak install <all apps>` per configuration. If even one app
  #     has no aarch64 build, that command fails to resolve and installs NOTHING
  #     on the uConsole (it does NOT skip the missing app). So this shared list
  #     must contain ONLY apps that have aarch64 builds. x86-only apps (Steam)
  #     live in recipe.yml so they only target the Aurora/x86 image.
  #     Verified aarch64 on Flathub: brave, obsidian, anki, xournalpp, bitwarden,
  #     ksnip, vlc, ytmdesktop, burpsuite (arch-indep JAR), protonvpn, pdfarranger.
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.brave.Browser
          - md.obsidian.Obsidian
          - net.ankiweb.Anki
          - com.github.xournalpp.xournalpp
          - com.bitwarden.desktop
          - org.ksnip.ksnip
          - org.videolan.VLC
          - app.ytmdesktop.ytmdesktop
          - net.portswigger.BurpSuite-Community
          - com.protonvpn.www
          - com.github.jeromerobert.pdfarranger
