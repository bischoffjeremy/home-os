---
name: os-base
description: Custom Aurora NVIDIA system with extras, Flatpaks & CH keyboard
base-image: ghcr.io/ublue-os/aurora-nvidia-open
image-version: latest

modules:
  # Force 120Hz on internal display (safe fallback to 60Hz if unsupported)
  - type: kargs
    kargs:
      - video=eDP-1:2560x1600@120

  - type: rpm-ostree
    install:
      - passwd
      - wireguard-tools
      - podman-compose
      # Voxtype – Push-to-Talk Voice Typing (https://voxtype.io)
      # Abhängigkeiten: wl-clipboard (Clipboard/paste-Modus), libnotify
      # (Benachrichtigungen), pipewire-alsa (Audio), playerctl (Musik pausieren).
      # wtype als Wayland-Standard; auf KDE Plasma nicht unterstützt -> ydotool
      # liefert den layout-unabhängigen Strg+V-Tastendruck für den paste-Modus.
      - wtype
      - ydotool
      - wl-clipboard
      - libnotify
      - pipewire-alsa
      - playerctl
      # Voxtype selbst (Version hier bumpen). Bringt alle Engines mit
      # (CPU AVX2/512, ONNX, Vulkan, CUDA 12/13). Whisper-Modell wird beim Build
      # nach /usr/share/voxtype/models gelegt (siehe script-Modul unten).
      - https://github.com/peteonrails/voxtype/releases/download/v0.7.5/voxtype-0.7.5-1.x86_64.rpm

  - type: files
    files:
      - source: starship.toml
        destination: /usr/etc/starship.toml

      - source: default.jxl
        destination: /usr/share/backgrounds/default.jxl
      - source: default-dark.jxl
        destination: /usr/share/backgrounds/default-dark.jxl

      # user + home definition
      - source: fedora-user.sysusers
        destination: /usr/lib/sysusers.d/50-fedora.conf
      - source: fedora-home.tmpfiles
        destination: /usr/lib/tmpfiles.d/50-fedora-home.conf

      # subuid/subgid for toolbox / rootless containers
      - source: subuid
        destination: /usr/etc/subuid
      - source: subgid
        destination: /usr/etc/subgid

      # keyboard + locale
      - source: vconsole.conf
        destination: /etc/vconsole.conf
      - source: 00-keyboard.conf
        destination: /etc/X11/xorg.conf.d/00-keyboard.conf
      - source: locale.conf
        destination: /etc/locale.conf
      # timezone
      - source: timezone
        destination: /etc/timezone

      # Voxtype: System-Default-Config (multilinguales Modell + paste-Modus für KDE/CH)
      - source: voxtype-config.toml
        destination: /etc/voxtype/config.toml
      # Voxtype: Vulkan-GPU für den User-Service erzwingen (VOXTYPE_GPU=1)
      - source: voxtype-gpu.conf
        destination: /usr/lib/systemd/user/voxtype.service.d/10-gpu.conf

  - type: script
    snippets:
      # increase inotify watches
      - mkdir -p /usr/lib/sysctl.d
      - echo "fs.inotify.max_user_watches=524288" > /usr/lib/sysctl.d/90-inotify.conf
      # enable root login
      - echo "root:root" | chpasswd
      - passwd -u root
      # create wireguard directory
      - mkdir -p /etc/wireguard
      # set timezone to Europe/Zurich
      - ln -sf /usr/share/zoneinfo/Europe/Zurich /etc/localtime
      # Voxtype: multilinguales Whisper-Modell ins Image backen (kein per-User-Download).
      # Für mehr Genauigkeit ggml-medium.bin / ggml-large-v3-turbo.bin laden und in
      # files/voxtype-config.toml den model-Pfad anpassen.
      - mkdir -p /usr/share/voxtype/models
      - curl -fsSL -o /usr/share/voxtype/models/ggml-small.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin
      - echo "Customizations applied."

  # Voxtype + ydotool als User-Dienste beim grafischen Login automatisch starten.
  # (Modell ist gebacken, daher kein Crash-Loop; voxtype.service zieht ydotool via Wants.)
  - type: systemd
    user:
      enabled:
        - voxtype.service
        - ydotool.service

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.brave.Browser
          - md.obsidian.Obsidian
          - net.ankiweb.Anki
          - com.github.xournalpp.xournalpp
          - com.bitwarden.desktop
          - org.ksnip.ksnip
          - org.videolan.VLC
          - app.ytmdesktop.ytmdesktop
          - net.portswigger.BurpSuite-Community
          - com.protonvpn.www
          - com.github.jeromerobert.pdfarranger
          - com.valvesoftware.Steam