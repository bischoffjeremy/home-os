---
name: os-base
description: Custom Aurora NVIDIA system with extras, Flatpaks & CH keyboard
base-image: ghcr.io/ublue-os/aurora-nvidia-open
image-version: latest

modules:
  # Force 120Hz on internal display (safe fallback to 60Hz if unsupported)
  - type: kargs
    kargs:
      - video=eDP-1:2560x1600@120

  - type: rpm-ostree
    install:
      - passwd
      - wireguard-tools
      - podman-compose
      
  - type: files
    files:
      - source: starship.toml
        destination: /usr/etc/starship.toml

      - source: default.jxl
        destination: /usr/share/backgrounds/default.jxl
      - source: default-dark.jxl
        destination: /usr/share/backgrounds/default-dark.jxl

      # user + home definition
      - source: fedora-user.sysusers
        destination: /usr/lib/sysusers.d/50-fedora.conf
      - source: fedora-home.tmpfiles
        destination: /usr/lib/tmpfiles.d/50-fedora-home.conf

      # subuid/subgid for toolbox / rootless containers
      - source: subuid
        destination: /usr/etc/subuid
      - source: subgid
        destination: /usr/etc/subgid

      # keyboard + locale
      - source: vconsole.conf
        destination: /etc/vconsole.conf
      - source: 00-keyboard.conf
        destination: /etc/X11/xorg.conf.d/00-keyboard.conf
      - source: locale.conf
        destination: /etc/locale.conf
      # timezone
      - source: timezone
        destination: /etc/timezone
      
  - type: script
    snippets:
      # increase inotify watches
      - mkdir -p /usr/lib/sysctl.d
      - echo "fs.inotify.max_user_watches=524288" > /usr/lib/sysctl.d/90-inotify.conf
      # enable root login
      - echo "root:root" | chpasswd
      - passwd -u root
      # create wireguard directory
      - mkdir -p /etc/wireguard
      # set timezone to Europe/Zurich
      - ln -sf /usr/share/zoneinfo/Europe/Zurich /etc/localtime
      - echo "Customizations applied."

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.brave.Browser
          - md.obsidian.Obsidian
          - net.ankiweb.Anki
          - com.github.xournalpp.xournalpp
          - com.bitwarden.desktop
          - org.ksnip.ksnip
          - org.videolan.VLC
          - app.ytmdesktop.ytmdesktop
          - net.portswigger.BurpSuite-Community
          - com.protonvpn.www
          - com.github.jeromerobert.pdfarranger
          - com.valvesoftware.Steam